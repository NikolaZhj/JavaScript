<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字飞花令 — 2D 对战</title>
    <style>
        :root {
            --bg: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'STSong', 'SimSun', 'Noto Serif SC', 'KaiTi', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* UI 叠加层 */
        .ui-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 30px;
        }

        .ui-layer>* {
            pointer-events: auto;
        }

        .input-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(20, 18, 30, 0.85);
            border: 1px solid rgba(212, 167, 116, 0.4);
            border-radius: 30px;
            padding: 6px 6px 6px 22px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .input-bar input {
            background: transparent;
            border: none;
            color: #f0d6b8;
            font-family: inherit;
            font-size: 1.15rem;
            letter-spacing: 3px;
            outline: none;
            width: 260px;
            padding: 10px 0;
        }

        .input-bar input::placeholder {
            color: rgba(180, 160, 140, 0.5);
            letter-spacing: 2px;
        }

        .input-bar button {
            padding: 11px 24px;
            border: 1px solid #d4a574;
            border-radius: 25px;
            background: rgba(212, 167, 116, 0.15);
            color: #d4a574;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            letter-spacing: 3px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .input-bar button:hover {
            background: rgba(212, 167, 116, 0.3);
            box-shadow: 0 0 24px rgba(212, 167, 116, 0.25);
        }

        .input-bar button:active {
            transform: scale(0.94);
        }

        .input-bar button.primary {
            background: #d4a574;
            color: #1a1a2e;
            border-color: #d4a574;
            font-weight: bold;
        }

        .bottom-btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .bottom-btns button {
            padding: 8px 18px;
            border: 1px solid rgba(180, 160, 140, 0.35);
            border-radius: 20px;
            background: rgba(20, 18, 30, 0.7);
            color: #b0a090;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .bottom-btns button:hover {
            border-color: #d4a574;
            color: #f0d6b8;
            background: rgba(212, 167, 116, 0.12);
        }

        .mode-indicator {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .mode-indicator button {
            padding: 8px 20px;
            border: 1px solid rgba(180, 160, 140, 0.3);
            border-radius: 20px;
            background: rgba(20, 18, 30, 0.75);
            color: #8a8070;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .mode-indicator button.active {
            border-color: #d4a574;
            color: #d4a574;
            background: rgba(212, 167, 116, 0.15);
            box-shadow: 0 0 16px rgba(212, 167, 116, 0.15);
        }

        .mode-indicator button:hover {
            border-color: #d4a574;
            color: #f0d6b8;
        }

        /* 消息提示 */
        .floating-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(80px);
            z-index: 20;
            pointer-events: none;
            font-size: 1.3rem;
            letter-spacing: 3px;
            color: #f0d6b8;
            text-shadow: 0 0 20px rgba(212, 167, 116, 0.7);
            animation: msgFloat 2.5s ease-out forwards;
            opacity: 0;
        }

        /* 解释面板 */
        .explanation-panel {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            pointer-events: none;
            background: rgba(20, 18, 30, 0.9);
            border: 1px solid rgba(212, 167, 116, 0.5);
            border-radius: 12px;
            padding: 12px 22px;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .explanation-panel.show {
            opacity: 1;
        }
        .explanation-panel .exp-word {
            font-size: 1.3rem;
            color: #f0d6b8;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }
        .explanation-panel .exp-text {
            font-size: 0.85rem;
            color: #b0a090;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        @keyframes msgFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(60px);
            }
            15% {
                opacity: 1;
                transform: translate(-50%, -50%) translateY(0px);
            }
            75% {
                opacity: 1;
                transform: translate(-50%, -50%) translateY(-30px);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(-80px);
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .input-bar input {
                width: 160px;
                font-size: 1rem;
            }
            .input-bar button {
                padding: 9px 16px;
                font-size: 0.85rem;
                letter-spacing: 1px;
            }
            .input-bar {
                padding: 4px 4px 4px 14px;
                gap: 4px;
            }
        }
    </style>
</head>

            const canvas = document.getElementById('gameCanvas');

            // ============================
            // 粒子系统
            // ============================
            class Particle {
                constructor(x, y, vx, vy, life, color, size, text) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.life = life;
                    this.maxLife = life;
                    this.color = color;
                    this.size = size;
                    this.text = text || null;
                    this.alpha = 1;
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    this.vy += 40 * dt;
                    this.life -= dt;
                    this.alpha = Math.max(0, this.life / this.maxLife);
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    if (this.text) {
                        ctx.font = this.size + 'px "STSong","SimSun","KaiTi",serif';
                        ctx.fillStyle = this.color;
                        ctx.textAlign = 'center';
                        ctx.fillText(this.text, this.x, this.y);
                    } else {
                        ctx.fillStyle = this.color;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
                get dead() { return this.life <= 0; }
            }

            const particles = [];

            function spawnParticles(x, y, count, color, sizeRange, textChars) {
                for (let i = 0; i < count; i++) {
                    const vx = (Math.random() - 0.5) * 300;
                    const vy = (Math.random() - 1.5) * 200 - 100;
                    const life = 0.8 + Math.random() * 1.5;
                    const size = sizeRange[0] + Math.random() * (sizeRange[1] - sizeRange[0]);
                    const text = textChars ? textChars[Math.floor(Math.random() * textChars.length)] : null;
                    particles.push(new Particle(x, y, vx, vy, life, color, size, text));
                }
            }

            // ============================
            // 飘浮背景字
            // ============================
            class FloatingChar {
                constructor() {
                    this.reset(true);
                }
                reset(initial) {
                    this.x = Math.random() * W;
                    this.y = initial ? Math.random() * H : H + 60;
                    this.vx = (Math.random() - 0.5) * 20;
                    this.vy = -(15 + Math.random() * 30);
                    this.size = 18 + Math.random() * 36;
                    this.alpha = 0.03 + Math.random() * 0.07;
                    this.char = numbers[Math.floor(Math.random() * numbers.length)];
                    this.rotation = (Math.random() - 0.5) * 0.3;
                }
                update(dt) {
                    this.x += this.vx * dt;
                    this.y += this.vy * dt;
                    if (this.y < -80 || this.x < -80 || this.x > W + 80) this.reset(false);
                }
                draw(ctx) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.font = this.size + 'px "STSong","SimSun","KaiTi",serif';
                    ctx.fillStyle = '#d4a574';
                    ctx.textAlign = 'center';
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.fillText(this.char, 0, 0);
                    ctx.restore();
                }
            }

            const floatingChars = [];
            for (let i = 0; i < 25; i++) floatingChars.push(new FloatingChar());

            // ============================
            // 攻击特效
            // ============================
            class AttackEffect {
                constructor(fromX, fromY, toX, toY, word) {
                    this.fromX = fromX;
                    this.fromY = fromY;
                    this.toX = toX;
                    this.toY = toY;
                    this.x = fromX;
                    this.y = fromY;
                    this.progress = 0;
                    this.duration = 0.6;
                    this.word = word;
                    this.done = false;
                    this.trailParticles = [];
                }
                update(dt) {
                    this.progress += dt / this.duration;
                    if (this.progress >= 1) { this.progress = 1;
                        this.done = true; }
                    const t = this.easeOutCubic(this.progress);
                    this.x = this.fromX + (this.toX - this.fromX) * t;
                    this.y = this.fromY + (this.toY - this.fromY) * t - Math.sin(this.progress * Math.PI) * 80;
                    if (Math.random() < 0.6) {
                        this.trailParticles.push({
                            x: this.x + (Math.random() - 0.5) * 20,
                            y: this.y + (Math.random() - 0.5) * 20,
                            life: 0.5 + Math.random() * 0.5,
                            maxLife: 0.8,
                            size: 2 + Math.random() * 4
                        });
                    }
                    for (let p of this.trailParticles) p.life -= dt;
                    this.trailParticles = this.trailParticles.filter(p => p.life > 0);
                }
                easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
                draw(ctx) {
                    ctx.save();
                    for (let p of this.trailParticles) {
                        ctx.globalAlpha = p.life / p.maxLife;
                        ctx.fillStyle = '#f0d6b8';
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1;
                    ctx.font = 'bold 22px "STSong","SimSun","KaiTi",serif';
                    ctx.fillStyle = '#f0d6b8';
                    ctx.textAlign = 'center';
                    ctx.shadowColor = 'rgba(212,167,116,0.8)';
                    ctx.shadowBlur = 20;
                    ctx.fillText(this.word, this.x, this.y);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            }

            // ============================
            // 背景绘制
            // ============================
            function drawBackground(ctx) {
                // 天空渐变
                const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
                skyGrad.addColorStop(0, '#0d0d1a');
                skyGrad.addColorStop(0.5, '#121526');
                skyGrad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, W, H);

                // 月亮
                const mx = W * 0.78,
                    my = H * 0.18;
                const moonGrad = ctx.createRadialGradient(mx, my, 0, mx, my, 70);
                moonGrad.addColorStop(0, 'rgba(240,220,180,0.9)');
                moonGrad.addColorStop(0.3, 'rgba(220,200,160,0.5)');
                moonGrad.addColorStop(0.7, 'rgba(180,160,120,0.08)');
                moonGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = moonGrad;
                ctx.beginPath();
                ctx.arc(mx, my, 100, 0, Math.PI * 2);
                ctx.fill();

                // 远山
                ctx.fillStyle = 'rgba(20,22,40,0.8)';
                ctx.beginPath();
                ctx.moveTo(0, H);
                for (let x = 0; x <= W; x += 20) {
                    const y = H * 0.55 + Math.sin(x * 0.004) * 60 + Math.sin(x * 0.013 + 1.5) * 35 + Math.sin(x * 0.025) *
                        20;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.closePath();
                ctx.fill();

                // 近山
                ctx.fillStyle = 'rgba(15,16,30,0.9)';
                ctx.beginPath();
                ctx.moveTo(0, H);
                for (let x = 0; x <= W; x += 15) {
                    const y = H * 0.7 + Math.sin(x * 0.006 + 2) * 50 + Math.sin(x * 0.018) * 30 + Math.sin(x * 0.03 + 1) * 15;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(W, H);
                ctx.closePath();
                ctx.fill();

                // 地面
                const groundGrad = ctx.createLinearGradient(0, H * 0.72, 0, H);
                groundGrad.addColorStop(0, '#151828');
                groundGrad.addColorStop(1, '#0c0d18');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, H * 0.72, W, H * 0.28);

                // 地面线
                ctx.strokeStyle = 'rgba(212,167,116,0.08)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, H * 0.72);
                for (let x = 0; x <= W; x += 50) {
                    ctx.lineTo(x, H * 0.72 + Math.sin(x * 0.01) * 3);
                }
                ctx.stroke();
            }

            // ============================
            // 角色绘制
            // ============================
            function drawCharacter(ctx, cx, cy, color, facingRight, hp, maxHp, name, isActive) {
                ctx.save();
                ctx.translate(cx, cy);

                // 光晕 (活跃时)
                if (isActive) {
                    const glowGrad = ctx.createRadialGradient(0, -10, 10, 0, -10, 60);
                    glowGrad.addColorStop(0, color.replace(')', ',0.25)').replace('rgb',
                        'rgba').replace('rgbaa', 'rgba'));
                    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = glowGrad;
                    ctx.beginPath();
                    ctx.arc(0, -10, 60, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 底座阴影
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(0, 40, 28, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // 身体
                const bodyGrad = ctx.createLinearGradient(0, -35, 0, 25);
                bodyGrad.addColorStop(0, color);
                bodyGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(-14, -25);
                ctx.lineTo(-18, 35);
                ctx.lineTo(18, 35);
                ctx.lineTo(14, -25);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // 头部
                ctx.fillStyle = '#f5e6d3';
                ctx.beginPath();
                ctx.arc(0, -32, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // 发髻
                ctx.fillStyle = '#2a1a0a';
                ctx.beginPath();
                ctx.arc(0, -42, 7, 0, Math.PI, true);
                ctx.fill();

                // 腰带
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(-15, 5, 30, 4);

                // 手臂
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(-17, -10, 5, 14, -0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(17, -10, 5, 14, 0.3, 0, Math.PI * 2);
                ctx.fill();

                // HP 条
                const hpBarW = 70;
                const hpBarH = 6;
                const hpBarY = -58;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(-hpBarW / 2 - 1, hpBarY - 1, hpBarW + 2, hpBarH + 2);
                ctx.fillStyle = '#3a1a1a';
                ctx.fillRect(-hpBarW / 2, hpBarY, hpBarW, hpBarH);
                const hpRatio = hp / maxHp;
                const hpColor = hpRatio > 0.5 ? '#e74c3c' : hpRatio > 0.25 ? '#e67e22' : '#c0392b';
                const hpGrad = ctx.createLinearGradient(-hpBarW / 2, 0, hpBarW / 2, 0);
                hpGrad.addColorStop(0, hpColor);
                hpGrad.addColorStop(1, hpRatio > 0.5 ? '#f39c12' : '#ff6b6b');
                ctx.fillStyle = hpGrad;
                ctx.fillRect(-hpBarW / 2, hpBarY, hpBarW * hpRatio, hpBarH);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(-hpBarW / 2, hpBarY, hpBarW, hpBarH);

                // 名字
                ctx.font = 'bold 13px "STSong","SimSun","KaiTi",serif';
                ctx.fillStyle = isActive ? '#f0d6b8' : '#8a8070';
                ctx.textAlign = 'center';
                ctx.fillText(name, 0, hpBarY - 6);

                ctx.restore();
            }

            // ============================
            // 中央令数显示
            // ============================
            function drawNumberDisplay(ctx, cx, cy, number) {
                ctx.save();
                // 光环
                const ringGrad = ctx.createRadialGradient(cx, cy, 30, cx, cy, 70);
                ringGrad.addColorStop(0, 'rgba(212,167,116,0.2)');
                ringGrad.addColorStop(0.5, 'rgba(212,167,116,0.05)');
                ringGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = ringGrad;
                ctx.beginPath();
                ctx.arc(cx, cy, 70, 0, Math.PI * 2);
                ctx.fill();

                // 数字
                ctx.font = 'bold 72px "STSong","SimSun","KaiTi",serif';
                ctx.fillStyle = '#d4a574';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(212,167,116,0.6)';
                ctx.shadowBlur = 35;
                ctx.fillText(number, cx, cy);
                ctx.shadowBlur = 0;

                // 标签
                ctx.font = '14px "STSong","SimSun","KaiTi",serif';
                ctx.fillStyle = 'rgba(200,180,150,0.7)';
                ctx.fillText('令', cx, cy - 55);

                ctx.restore();
            }

            // ============================
            // 计时器
            // ============================
            function drawTimer(ctx) {
                const cx = W / 2;
                const cy = H * 0.82;
                const barW = 260;
                const barH = 6;
                const ratio = state.timerSeconds / 20;

                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(cx - barW / 2 - 2, cy - barH / 2 - 2, barW + 4, barH + 4);
                ctx.fillStyle = '#2a2a3e';
                ctx.fillRect(cx - barW / 2, cy - barH / 2, barW, barH);

                const timerColor = ratio > 0.3 ? '#d4a574' : '#e74c3c';
                const timerGrad = ctx.createLinearGradient(cx - barW / 2, 0, cx + barW / 2, 0);
                timerGrad.addColorStop(0, timerColor);
                timerGrad.addColorStop(1, ratio > 0.3 ? '#f0d6b8' : '#ff6b6b');
                ctx.fillStyle = timerGrad;
                ctx.fillRect(cx - barW / 2, cy - barH / 2, barW * ratio, barH);

                ctx.font = '12px "STSong","SimSun","KaiTi",serif';
                ctx.fillStyle = ratio > 0.3 ? '#b0a090' : '#e74c3c';
                ctx.textAlign = 'center';
                ctx.fillText(state.timerSeconds + ' 秒', cx, cy - 12);

                ctx.restore();
            }

            // 已用词汇滚动区
            // ============================
            const recentWords = [];

            function addRecentWord(word, playerNum) {
                recentWords.push({
                    word,
                    player: playerNum,
                    life: 4.0,
                    maxLife: 4.0,
                    x: playerNum === 1 ? W * 0.08 : W * 0.72,
                    y: H * 0.78 - recentWords.length * 26,
                });
                if (recentWords.length > 12) recentWords.shift();
            }

            function updateRecentWords(dt) {
                for (let rw of recentWords) {
                    rw.life -= dt;
                    rw.y -= 8 * dt;
                }
                for (let i = recentWords.length - 1; i >= 0; i--) {
                    if (recentWords[i].life <= 0) recentWords.splice(i, 1);
                }
            }

            function drawRecentWords(ctx) {
                for (let rw of recentWords) {
                    const alpha = Math.min(1, rw.life / rw.maxLife);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.font = '15px "STSong","SimSun","KaiTi",serif';
                    ctx.fillStyle = rw.player === 1 ? '#e74c3c' : (state.mode === 'ai' ? '#9b59b6' : '#3498db');
                    ctx.textAlign = rw.player === 1 ? 'left' : 'right';
                    ctx.shadowColor = 'rgba(0,0,0,0.7)';
                    ctx.shadowBlur = 4;
                    ctx.fillText(rw.word, rw.x, rw.y);
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            }

            // ============================
            // 主绘制
            // ============================
            function draw(ctx, dt) {
                ctx.clearRect(0, 0, W, H);

                // 震动偏移
                let sx = 0,
                    sy = 0;
                if (shakeDuration > 0) {
                    sx = (Math.random() - 0.5) * shakeAmount * 2;
                    sy = (Math.random() - 0.5) * shakeAmount * 2;
                    shakeDuration -= dt;
                    shakeAmount *= 0.85;
                    if (shakeDuration <= 0) { shakeAmount = 0;
                        shakeDuration = 0; }
                }
                ctx.save();
                ctx.translate(sx, sy);

                drawBackground(ctx);

                // 漂浮字
                for (let fc of floatingChars) fc.draw(ctx);

                // 角色位置
                const p1x = W * 0.2;
                const p1y = H * 0.55;
                const p2x = W * 0.8;
                const p2y = H * 0.55;
                const numCx = W * 0.5;
                const numCy = H * 0.38;

                // 地面装饰线
                ctx.strokeStyle = 'rgba(212,167,116,0.2)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 12]);
                ctx.beginPath();
                ctx.moveTo(p1x, H * 0.72);
                ctx.lineTo(p2x, H * 0.72);
                ctx.stroke();
                ctx.setLineDash([]);

                // 绘制角色
                const p1Color = '#c0392b';
                const p2Color = state.mode === 'ai' ? '#7d3c98' : '#2471a3';
                const p1Active = state.currentPlayer === 1 && state.gameActive;
                const p2Active = state.currentPlayer === 2 && state.gameActive;

                drawCharacter(ctx, p1x, p1y, p1Color, true, state.hp[0], state.maxHp, getPlayerName(1), p1Active);
                drawCharacter(ctx, p2x, p2y, p2Color, false, state.hp[1], state.maxHp, getPlayerName(2), p2Active);

                // 令数
                drawNumberDisplay(ctx, numCx, numCy, state.currentNumber);

                // VS 标志
                ctx.font = 'bold 20px "STSong","SimSong","KaiTi",serif';
                ctx.fillStyle = 'rgba(212,167,116,0.5)';
                ctx.textAlign = 'center';
                ctx.fillText('⚔', numCx, numCy + 65);

                // 计时器
                if (state.gameActive) drawTimer(ctx);

                // 已用词汇
                drawRecentWords(ctx);

                ctx.restore();

                // 攻击特效
                if (activeAttack) {
                    activeAttack.draw(ctx);
                }

                // 粒子
                for (let p of particles) p.draw(ctx);
            }

            // ============================
            // 游戏逻辑
            // ============================
            function isValidWord(word) {
                if (!word || word.trim().length === 0) return false;
                word = word.trim();
                if (word.length < 2 || word.length > 20) return false;
                if (!word.includes(state.currentNumber)) return false;
                if (state.usedWords.has(word)) return false;
                if (!/^[\u4e00-\u9fa5，。！？、；：""''《》（）\s]+$/.test(word)) return false;
                return true;
            }

            function addUsedWord(word, playerNum) {
                state.usedWords.add(word);
                addRecentWord(word, playerNum);
            }

            function getAttackerPos(playerNum) {
                if (playerNum === 1) return { x: W * 0.2, y: H * 0.5 };
                return { x: W * 0.8, y: H * 0.5 };
            }

            function getDefenderPos(playerNum) {
                if (playerNum === 1) return { x: W * 0.8, y: H * 0.5 };
                return { x: W * 0.2, y: H * 0.5 };
            }

            function playerSubmit() {
                if (!state.gameActive) return;
                if (state.mode === 'ai' && state.currentPlayer === 2) return;

                const word = wordInput.value.trim();
                if (!isValidWord(word)) {
                    if (!word) showFloatingMsg('请输入诗句或成语');
                    else if (!word.includes(state.currentNumber)) showFloatingMsg('须含 "' + state.currentNumber + '"');
                    else if (state.usedWords.has(word)) showFloatingMsg('此词已用过');
                    else showFloatingMsg('请输入有效中文词汇');
                    wordInput.focus();
                    triggerShake(3, 0.15);
                    return;
                }

                stopTimer();
                hideMessage();
                addUsedWord(word, state.currentPlayer);
                showExplanation(word);
                wordInput.value = '';

                // 攻击特效
                const from = getAttackerPos(state.currentPlayer);
                const to = getDefenderPos(state.currentPlayer);
                const targetPlayer = state.currentPlayer === 1 ? 2 : 1;
                activeAttack = new AttackEffect(from.x, from.y, to.x, to.y, word);

                // 伤害计算
                const dmg = 8 + Math.floor(Math.random() * 7);
                state.hp[targetPlayer - 1] = Math.max(0, state.hp[targetPlayer - 1] - dmg);
                spawnParticles(to.x, to.y, 20, '#f0d6b8', [2, 8], word.split(''));

                if (state.hp[targetPlayer - 1] <= 0) {
                    endRound(state.currentPlayer, '击倒对手');
                } else {
                    setTimeout(() => switchPlayer(), 800);
                }
            }

            function endRound(winner, reason) {
                if (!state.gameActive) return;
                state.gameActive = false;
                stopTimer();
                state.matchWins[winner - 1]++;
                wordInput.disabled = true;
                btnSubmit.disabled = true;
                triggerShake(8, 0.5);
                spawnParticles(W / 2, H / 2, 40, '#f0d6b8', [3, 12], ['胜', '利', '🏆', '✨']);
                showFloatingMsg('🏆 ' + getPlayerName(winner) + ' 胜！');

                if (state.matchWins[winner - 1] >= 3) {
                    setTimeout(() => {
                        state.hp = [100, 100];
                        state.matchWins = [0, 0];
                        state.roundCount = 0;
                        updateUIForMode();
                        startNewRound();
                        showFloatingMsg('🎉 ' + getPlayerName(winner) + ' 最终获胜！');
                        spawnParticles(W / 2, H / 2, 60, '#ffd700', [4, 16], ['🏆', '胜', '利', '！', '✨', '🎉']);
                    }, 2000);
                } else {
                    setTimeout(() => {
                        state.hp = [100, 100];
                        startNewRound();
                    }, 2000);
                }
            }

            function startNewRound() {
                state.gameActive = true;
                state.usedWords.clear();
                recentWords.length = 0;
                wordInput.disabled = false;
                wordInput.value = '';
                btnSubmit.disabled = false;
                hideMessage();
                state.roundCount++;
                state.currentPlayer = Math.random() < 0.5 ? 1 : 2;
                wordInput.focus();
                startTimer();
                if (state.mode === 'ai' && state.currentPlayer === 2) {
                    wordInput.disabled = true;
                    btnSubmit.disabled = true;
                    setTimeout(aiPlay, 900 + Math.random() * 1400);
                } else {
                    wordInput.disabled = false;
                    btnSubmit.disabled = false;
                }
            }

            function switchPlayer() {
                state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
                startTimer();
                if (state.mode === 'ai' && state.currentPlayer === 2) {
                    wordInput.disabled = true;
                    btnSubmit.disabled = true;
                    setTimeout(aiPlay, 600 + Math.random() * 1000);
                } else {
                    wordInput.disabled = false;
                    btnSubmit.disabled = false;
                    wordInput.focus();
                }
            }

            function aiPlay() {
                if (!state.gameActive) return;
                if (state.currentPlayer !== 2) return;
                const available = [];
                allWordsMap.forEach((num, word) => {
                    if (num === state.currentNumber && !state.usedWords.has(word)) available.push(word);
                });
                if (available.length === 0) {
                    stopTimer();
                    showFloatingMsg('🤖 AI 词穷！');
                    endRound(1, 'AI词穷');
                    return;
                }
                const chosen = available[Math.floor(Math.random() * available.length)];
                addUsedWord(chosen, 2);
                showExplanation(chosen);
                const from = getAttackerPos(2);
                const to = getDefenderPos(2);
                activeAttack = new AttackEffect(from.x, from.y, to.x, to.y, chosen);
                const dmg = 6 + Math.floor(Math.random() * 8);
                state.hp[0] = Math.max(0, state.hp[0] - dmg);
                spawnParticles(to.x, to.y, 18, '#9b59b6', [2, 8], chosen.split(''));
                if (state.hp[0] <= 0) {
                    endRound(2, 'AI击倒玩家');
                } else {
                    setTimeout(() => {
                        if (state.gameActive) switchPlayer();
                    }, 800);
                }
            }

            function startTimer() {
                clearInterval(state.timerInterval);
                state.timerSeconds = 20;
                state.timerInterval = setInterval(() => {
                    state.timerSeconds--;
                    if (state.timerSeconds <= 0) {
                        clearInterval(state.timerInterval);
                        handleTimeout();
                    }
                }, 1000);
            }

            function stopTimer() {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }

            function handleTimeout() {
                if (!state.gameActive) return;
                const loser = state.currentPlayer;
                showFloatingMsg('⏰ ' + getPlayerName(loser) + ' 超时！');
                triggerShake(5, 0.3);
                endRound(loser === 1 ? 2 : 1, '对方超时');
            }

            function hideMessage() {}

            function changeNumber() {
                stopTimer();
                let newNum;
                do { newNum = numbers[Math.floor(Math.random() * numbers.length)]; } while (newNum === state.currentNumber &&
                    numbers.length > 1);
                state.currentNumber = newNum;
                state.hp = [100, 100];
                state.usedWords.clear();
                recentWords.length = 0;
                wordInput.value = '';
                startNewRound();
                showFloatingMsg('🎲 令数 → ' + newNum);
            }

            function resetGame() {
                stopTimer();
                state.hp = [100, 100];
                state.matchWins = [0, 0];
                state.usedWords.clear();
                state.roundCount = 0;
                state.gameActive = false;
                recentWords.length = 0;
                wordInput.value = '';
                wordInput.disabled = false;
                btnSubmit.disabled = false;
                state.currentNumber = numbers[Math.floor(Math.random() * numbers.length)];
                updateUIForMode();
                startNewRound();
            }

            function switchMode(mode) {
                if (state.gameActive && state.roundCount > 0) {
                    if (!confirm('切换模式将重置游戏，确定吗？')) return;
                }
                state.mode = mode;
                document.querySelectorAll('.mode-indicator button').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-mode="' + mode + '"]').classList.add('active');
                resetGame();
            }

            function updateUIForMode() {
                // 更新模式按钮
                document.querySelectorAll('.mode-indicator button').forEach(b => {
                    b.classList.toggle('active', b.dataset.mode === state.mode);
                });
            }

            // ============================
            // 事件
            // ============================
            btnSubmit.addEventListener('click', playerSubmit);
            wordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') playerSubmit();
            });
            btnReset.addEventListener('click', resetGame);
            btnNewNumber.addEventListener('click', changeNumber);

            document.querySelectorAll('.mode-indicator button').forEach(btn => {
                btn.addEventListener('click', () => switchMode(btn.dataset.mode));
            });

            // 防止移动端键盘弹出时画面滚动
            document.addEventListener('touchmove', (e) => { if (e.target.tagName !== 'INPUT') e.preventDefault(); }, {
                passive: false });

            // ============================
            // 游戏循环
            // ============================
            let lastTime = 0;

            function gameLoop(timestamp) {
                const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
                lastTime = timestamp;

                // 更新
                for (let fc of floatingChars) fc.update(dt);
                for (let p of particles) p.update(dt);
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (particles[i].dead) particles.splice(i, 1);
                }
                if (activeAttack) {
                    activeAttack.update(dt);
                    if (activeAttack.done) activeAttack = null;
                }
                updateRecentWords(dt);

                // 绘制
                draw(ctx, dt);

                requestAnimationFrame(gameLoop);
            }

            // ============================
            // 初始化
            // ============================
            function init() {
                state.currentNumber = numbers[Math.floor(Math.random() * numbers.length)];
                state.mode = 'ai';
                updateUIForMode();
                startNewRound();
            }

            init();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);

            console.log('⚔️ 数字飞花令 2D 对战版已就绪！');
            console.log('数据库共加载 ' + allWordsMap.size + ' 条词汇');
        })();
    </script>
</body>
</html>

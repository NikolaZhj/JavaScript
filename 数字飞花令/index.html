<html lang="zh-CN">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字飞花令</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel-bg: #1a1a2e;
            --gold: #d4a574;
            --gold-light: #f0d6b8;
            --red: #c0392b;
            --red-light: #e74c3c;
            --text: #e0d5c1;
            --text-dim: #8a8070;
            --input-bg: #2a2a3e;
            --border: #3a3a4e;
            --success: #27ae60;
            --danger: #c0392b;
            --player1: #e74c3c;
            --player2: #3498db;
            --ai: #9b59b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'STSong', 'SimSun', 'Noto Serif SC', 'KaiTi', '楷体', '华文楷体', serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(212, 167, 116, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(192, 57, 43, 0.04) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow-x: hidden;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 8px;
            text-shadow: 0 0 40px rgba(212, 167, 116, 0.3), 0 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-dim);
            letter-spacing: 4px;
        }

        .decoration-line {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 15px auto;
        }

        /* 主面板 */
        .main-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .main-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 167, 116, 0.4), transparent);
        }

        /* 游戏模式选择 */
        .mode-select {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .mode-btn {
            padding: 10px 24px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            border-radius: 25px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .mode-btn:hover {
            border-color: var(--gold);
            color: var(--gold-light);
        }

        .mode-btn.active {
            background: rgba(212, 167, 116, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* 数字展示区 */
        .number-display {
            text-align: center;
            margin: 20px 0 30px;
        }

        .number-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .number-char {
            font-size: 6rem;
            font-weight: bold;
            color: var(--gold);
            text-shadow: 0 0 60px rgba(212, 167, 116, 0.4), 0 4px 8px rgba(0, 0, 0, 0.5);
            line-height: 1;
            animation: numberPulse 2s ease-in-out infinite;
        }

        @keyframes numberPulse {
            0%,
            100% {
                text-shadow: 0 0 60px rgba(212, 167, 116, 0.4), 0 4px 8px rgba(0, 0, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 80px rgba(212, 167, 116, 0.7), 0 4px 12px rgba(0, 0, 0, 0.6);
            }
        }

        /* 比分 */
        .scoreboard {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
        }

        .score-col {
            text-align: center;
            flex: 1;
        }

        .score-name {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .score-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--gold-light);
        }

        .score-divider {
            font-size: 1.5rem;
            color: var(--text-dim);
            font-weight: bold;
        }

        .score-col.player1 .score-value {
            color: var(--player1);
        }
        .score-col.player2 .score-value {
            color: var(--player2);
        }
        .score-col.ai .score-value {
            color: var(--ai);
        }

        /* 回合提示 */
        .turn-indicator {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            letter-spacing: 2px;
        }

        .turn-indicator.player1-turn {
            color: var(--player1);
            background: rgba(231, 76, 60, 0.08);
        }
        .turn-indicator.player2-turn {
            color: var(--player2);
            background: rgba(52, 152, 219, 0.08);
        }

        /* 输入区 */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 25px;
            background: var(--input-bg);
            color: var(--text);
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s;
        }

        .input-area input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 167, 116, 0.1);
        }

        .input-area input::placeholder {
            color: #5a5a6e;
            letter-spacing: 1px;
        }

        .btn {
            padding: 14px 28px;
            border: 1px solid var(--gold);
            border-radius: 25px;
            background: rgba(212, 167, 116, 0.1);
            color: var(--gold);
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(212, 167, 116, 0.2);
            box-shadow: 0 0 20px rgba(212, 167, 116, 0.2);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn.primary {
            background: var(--gold);
            color: #1a1a2e;
            border-color: var(--gold);
            font-weight: bold;
        }

        .btn.primary:hover {
            background: var(--gold-light);
            box-shadow: 0 0 30px rgba(212, 167, 116, 0.4);
        }

        .btn.danger {
            border-color: var(--red);
            color: var(--red-light);
            background: rgba(231, 76, 60, 0.1);
        }

        .btn.danger:hover {
            background: rgba(231, 76, 60, 0.2);
        }

        /* 计时器 */
        .timer {
            text-align: center;
            margin-bottom: 15px;
        }

        .timer-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .timer-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 2px;
            transition: width 1s linear;
        }

        .timer-fill.urgent {
            background: var(--red);
            animation: timerBlink 0.5s infinite;
        }

        @keyframes timerBlink {
            50% {
                opacity: 0.4;
            }
        }

        .timer-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 2px;
        }

        .timer-text.urgent {
            color: var(--red-light);
        }

        /* 已用词汇 */
        .used-section {
            margin-top: 15px;
        }

        .used-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .used-label:hover {
            color: var(--gold-light);
        }

        .used-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px 0;
        }

        .used-list::-webkit-scrollbar {
            width: 4px;
        }

        .used-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .used-tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            animation: fadeInTag 0.3s ease;
        }

        .used-tag.p1 {
            background: rgba(231, 76, 60, 0.15);
            color: var(--player1);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .used-tag.p2 {
            background: rgba(52, 152, 219, 0.15);
            color: var(--player2);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .used-tag.ai {
            background: rgba(155, 89, 182, 0.15);
            color: var(--ai);
            border: 1px solid rgba(155, 89, 182, 0.3);
        }

        @keyframes fadeInTag {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 消息提示 */
        .message {
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            letter-spacing: 2px;
            animation: fadeInTag 0.3s ease;
        }

        .message.error {
            color: var(--red-light);
            background: rgba(231, 76, 60, 0.1);
        }
        .message.success {
            color: var(--success);
            background: rgba(39, 174, 96, 0.1);
        }
        .message.info {
            color: var(--gold-light);
            background: rgba(212, 167, 116, 0.1);
        }

        /* 结果弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--panel-bg);
            border: 1px solid var(--gold);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            max-width: 420px;
            width: 90%;
        }

        .modal .winner-text {
            font-size: 2rem;
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .modal .winner-detail {
            font-size: 1rem;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .modal .btn {
            margin: 5px;
        }

        /* 响应式 */
        @media (max-width: 500px) {
            .title {
                font-size: 2.2rem;
                letter-spacing: 4px;
            }
            .number-char {
                font-size: 4rem;
            }
            .main-panel {
                padding: 20px 15px;
            }
            .input-area {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
            .scoreboard {
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <div class="title">数字飞花令</div>
            <div class="decoration-line"></div>
            <div class="subtitle">以数为令 · 飞花传诗</div>
        </div>

        <!-- 主面板 -->
        <div class="main-panel" id="mainPanel">
            <!-- 模式选择 -->
            <div class="mode-select" id="modeSelect">
                <button class="mode-btn active" data-mode="ai">🤖 人机对战</button>
                <button class="mode-btn" data-mode="pvp">👥 双人对战</button>
            </div>

            <!-- 数字展示 -->
            <div class="number-display">
                <div class="number-label">本 轮 令 数</div>
                <div class="number-char" id="numberChar">一</div>
            </div>

            <!-- 比分 -->
            <div class="scoreboard">
                <div class="score-col player1" id="scoreCol1">
                    <div class="score-name" id="scoreName1">🟡 玩家</div>
                    <div class="score-value" id="scoreVal1">0</div>
                </div>
                <div class="score-divider">:</div>
                <div class="score-col" id="scoreCol2">
                    <div class="score-name" id="scoreName2">对手</div>
                    <div class="score-value" id="scoreVal2">0</div>
                </div>
            </div>

            <!-- 回合指示 -->
            <div class="turn-indicator" id="turnIndicator">玩家回合 — 请输入含 "<span id="turnNum">一</span>" 的成语或诗句</div>

            <!-- 计时器 -->
            <div class="timer">
                <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
                <div class="timer-text" id="timerText">剩余 20 秒</div>
            </div>

            <!-- 输入区 -->
            <div class="input-area">
                <input type="text" id="wordInput" placeholder="输入成语或诗句..." maxlength="20" autocomplete="off">
                <button class="btn primary" id="btnSubmit">提交</button>
                <button class="btn" id="btnPass" style="display:none;">跳过</button>
            </div>

            <!-- 消息 -->
            <div class="message" id="message" style="display:none;"></div>

            <!-- 已用词汇 -->
            <div class="used-section" id="usedSection">
                <div class="used-label" id="usedToggle">📜 已用词汇 <span id="usedCount">(0)</span></div>
                <div class="used-list" id="usedList"></div>
            </div>

            <!-- 控制按钮 -->
            <div style="text-align:center; margin-top:20px;">
                <button class="btn danger" id="btnReset">🔄 重新开始</button>
                <button class="btn" id="btnNewNumber">🎲 换一个数</button>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 (隐藏) -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;">
        <div class="modal">
            <div class="winner-text" id="modalWinner"></div>
            <div class="winner-detail" id="modalDetail"></div>
            <button class="btn primary" id="btnPlayAgain">再来一局</button>
        </div>
    </div>

            // ===== 辅助函数 =====
            function showMessage(text, type) {
                messageEl.textContent = text;
                messageEl.className = 'message ' + type;
                messageEl.style.display = 'block';
                clearTimeout(messageEl._timeout);
                messageEl._timeout = setTimeout(() => {
                    if (messageEl.textContent === text) messageEl.style.display = 'none';
                }, 2500);
            }

            function hideMessage() {
                messageEl.style.display = 'none';
                clearTimeout(messageEl._timeout);
            }

            // ===== 计时器 =====
            function startTimer() {
                clearInterval(state.timerInterval);
                state.timerSeconds = 20;
                updateTimerUI();
                state.timerInterval = setInterval(() => {
                    state.timerSeconds--;
                    updateTimerUI();
                    if (state.timerSeconds <= 0) {
                        clearInterval(state.timerInterval);
                        handleTimeout();
                    }
                }, 1000);
            }

            function stopTimer() {
                clearInterval(state.timerInterval);
                state.timerInterval = null;
            }

            function updateTimerUI() {
                const pct = (state.timerSeconds / 20) * 100;
                timerFill.style.width = pct + '%';
                timerText.textContent = '剩余 ' + state.timerSeconds + ' 秒';
                if (state.timerSeconds <= 5) {
                    timerFill.classList.add('urgent');
                    timerText.classList.add('urgent');
                } else {
                    timerFill.classList.remove('urgent');
                    timerText.classList.remove('urgent');
                }
            }

            // ===== 超时处理 =====
            function handleTimeout() {
                if (!state.gameActive) return;
                const loser = state.currentPlayer;
                const loserName = getPlayerName(loser);
                showMessage('⏰ ' + loserName + ' 超时！', 'error');
                // 判断胜负
                endRound(loser === 1 ? 2 : 1, '对方超时');
            }

            function getPlayerName(playerNum) {
                if (playerNum === 1) return '玩家';
                return state.mode === 'ai' ? 'AI 对手' : '玩家二';
            }

            // ===== 检查词汇 =====
            function isValidWord(word) {
                if (!word || word.trim().length === 0) return false;
                word = word.trim();
                // 检查长度
                if (word.length < 2 || word.length > 20) return false;
                // 检查是否包含当前数字
                if (!word.includes(state.currentNumber)) return false;
                // 检查是否已被使用
                if (state.usedWords.has(word)) return false;
                // 检查是否为纯中文
                if (!/^[\u4e00-\u9fa5，。！？、；：""''《》（）\s]+$/.test(word)) return false;
                return true;
            }

            // ===== 添加已用词汇 =====
            function addUsedWord(word, playerNum) {
                state.usedWords.add(word);
                const tag = document.createElement('span');
                tag.className = 'used-tag ' + (playerNum === 1 ? 'p1' : (state.mode === 'ai' ? 'ai' : 'p2'));
                tag.textContent = word;
                usedList.appendChild(tag);
                usedCount.textContent = '(' + state.usedWords.size + ')';
                // 滚动到底部
                usedList.scrollTop = usedList.scrollHeight;
            }

            // ===== 回合结束 =====
            function endRound(winner, reason) {
                if (!state.gameActive) return;
                state.gameActive = false;
                stopTimer();
                state.scores[winner - 1]++;
                updateScoreboard();
                wordInput.disabled = true;
                btnSubmit.disabled = true;

                const winnerName = getPlayerName(winner);
                showMessage('🏆 ' + winnerName + ' 赢得此轮！(' + reason + ')', 'success');

                // 检查是否达到10分
                if (state.scores[winner - 1] >= 10) {
                    setTimeout(() => showEndGameModal(winner), 1500);
                } else {
                    setTimeout(autoStartNewRound, 2000);
                }
            }

            function autoStartNewRound() {
                if (state.scores[0] >= 10 || state.scores[1] >= 10) return;
                startNewRound();
            }

            // ===== 新回合 =====
            function startNewRound() {
                state.gameActive = true;
                state.usedWords.clear();
                usedList.innerHTML = '';
                usedCount.textContent = '(0)';
                wordInput.disabled = false;
                wordInput.value = '';
                btnSubmit.disabled = false;
                hideMessage();
                state.roundCount++;

                // 随机谁先手
                state.currentPlayer = Math.random() < 0.5 ? 1 : 2;

                updateTurnUI();
                wordInput.focus();

                // 启动计时器
                startTimer();

                // AI先手
                if (state.mode === 'ai' && state.currentPlayer === 2) {
                    wordInput.disabled = true;
                    btnSubmit.disabled = true;
                    setTimeout(aiPlay, 800 + Math.random() * 1500);
                } else {
                    wordInput.disabled = false;
                    btnSubmit.disabled = false;
                }

            function updateTurnUI() {
                const name = getPlayerName(state.currentPlayer);
                turnNum.textContent = state.currentNumber;
                turnIndicator.textContent = name + '回合 — 请输入含 "' + state.currentNumber + '" 的成语或诗句';
                turnIndicator.className = 'turn-indicator ' + (state.currentPlayer === 1 ? 'player1-turn' :
                    'player2-turn');
            }

            function updateScoreboard() {
                scoreVal1.textContent = state.scores[0];
                scoreVal2.textContent = state.scores[1];
                if (state.mode === 'ai') {
                    scoreName1.textContent = '🟡 玩家';
                    scoreName2.textContent = '🤖 AI';
                    scoreCol2.className = 'score-col ai';
                } else {
                    scoreName1.textContent = '🔴 玩家一';
                    scoreName2.textContent = '🔵 玩家二';
                    scoreCol2.className = 'score-col player2';
                }
            }

            // ===== 切换玩家 =====
            function switchPlayer() {
                state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
                updateTurnUI();
                startTimer();

                if (state.mode === 'ai' && state.currentPlayer === 2) {
                    wordInput.disabled = true;
                    btnSubmit.disabled = true;
                    setTimeout(aiPlay, 600 + Math.random() * 1200);
                } else {
                    wordInput.disabled = false;
                    btnSubmit.disabled = false;
                    wordInput.focus();
                }
            }

            // ===== 玩家提交 =====
            function playerSubmit() {
                if (!state.gameActive) return;
                if (state.mode === 'ai' && state.currentPlayer === 2) return;

                const word = wordInput.value.trim();
                if (!isValidWord(word)) {
                    if (!word) {
                        showMessage('请输入成语或诗句', 'error');
                    } else if (!word.includes(state.currentNumber)) {
                        showMessage('词汇中必须包含数字 "' + state.currentNumber + '"', 'error');
                    } else if (state.usedWords.has(word)) {
                        showMessage('此词汇已被使用过', 'error');
                    } else {
                        showMessage('请输入有效的中文词汇（2-20字）', 'error');
                    }
                    wordInput.focus();
                    return;
                }

                stopTimer();
                hideMessage();
                addUsedWord(word, state.currentPlayer);
                wordInput.value = '';
                showMessage('✅ ' + getPlayerName(state.currentPlayer) + ' 说出了 "' + word + '"', 'success');
                switchPlayer();
            }

            // ===== AI 出词 =====
            function aiPlay() {
                if (!state.gameActive) return;
                if (state.currentPlayer !== 2) return;

                // 查找可用的词汇
                const available = [];
                allWordsMap.forEach((num, word) => {
                    if (num === state.currentNumber && !state.usedWords.has(word)) {
                        available.push(word);
                    }
                });

                if (available.length === 0) {
                    // AI无法回答，玩家胜
                    stopTimer();
                    showMessage('🤖 AI 想不出更多词汇了！', 'info');
                    endRound(1, 'AI词穷');
                    return;
                }

                // 随机选一个
                const chosen = available[Math.floor(Math.random() * available.length)];
                addUsedWord(chosen, 2);
                showMessage('🤖 AI 说出了 "' + chosen + '"', 'info');
                setTimeout(() => {
                    if (state.gameActive) switchPlayer();
                }, 500);
            }

                state.gameActive = false;

                let newNum;
                do {
                    newNum = numbers[Math.floor(Math.random() * numbers.length)];
                } while (newNum === state.currentNumber && numbers.length > 1);

                state.currentNumber = newNum;
                numberChar.textContent = newNum;
                state.usedWords.clear();
                usedList.innerHTML = '';
                usedCount.textContent = '(0)';
                wordInput.value = '';
                hideMessage();

                startNewRound();
                showMessage('🎲 令数更换为 "' + newNum + '"', 'info');
            }

            // ===== 重置游戏 =====
            function resetGame() {
                stopTimer();
                state.scores = [0, 0];
                state.usedWords.clear();
                state.roundCount = 0;
                state.gameActive = false;
                usedList.innerHTML = '';
                usedCount.textContent = '(0)';
                wordInput.value = '';
                wordInput.disabled = false;
                btnSubmit.disabled = false;
                hideMessage();
                hideModal();
                updateScoreboard();

                // 随机选一个新数字
                state.currentNumber = numbers[Math.floor(Math.random() * numbers.length)];
                numberChar.textContent = state.currentNumber;
                turnNum.textContent = state.currentNumber;

                startNewRound();
            }

            // ===== 切换模式 =====
            function switchMode(mode) {
                if (state.gameActive && state.roundCount > 0) {
                    if (!confirm('切换模式将重置游戏，确定吗？')) return;
                }
                state.mode = mode;
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('[data-mode="' + mode + '"]').classList.add('active');
                resetGame();
            }

            // ===== 事件绑定 =====
            btnSubmit.addEventListener('click', playerSubmit);
            wordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') playerSubmit();
            });
            btnReset.addEventListener('click', resetGame);
            btnNewNumber.addEventListener('click', changeNumber);
            btnPlayAgain.addEventListener('click', () => { hideModal();
                resetGame(); });
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) hideModal();
            });

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => switchMode(btn.dataset.mode));
            });

            // 已用词汇折叠
            $('usedToggle').addEventListener('click', () => {
                const list = $('usedList');
                if (list.style.display === 'none') {
                    list.style.display = 'flex';
                } else {
                    list.style.display = 'none';
                }
            });

            // ===== 初始化 =====
            function init() {
                state.currentNumber = numbers[Math.floor(Math.random() * numbers.length)];
                numberChar.textContent = state.currentNumber;
                turnNum.textContent = state.currentNumber;
                updateScoreboard();
                state.mode = 'ai';
                document.querySelector('[data-mode="ai"]').classList.add('active');
                startNewRound();
            }

            init();
            console.log('🌸 数字飞花令已就绪！');
            console.log('数据库共加载 ' + allWordsMap.size + ' 条词汇');
            console.log('支持的数字：' + numbers.join('、'));
        })();
    </script>
</body>
</html>
